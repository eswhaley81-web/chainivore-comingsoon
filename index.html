<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta property="og:title" content="Chainivore">

  <!-- Twitter -->

  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1C1C1C;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
      font-family: sans-serif;
      text-align: center;
    }
    .logo-mark {
      width: 52px;
      height: 52px;
      margin-bottom: 1.25rem;
    }
    .wordmark {
      font-family: 'Syne', sans-serif;
      font-size: 2.25rem;
      font-weight: 500;
      color: #F7F6F3;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 0.95rem;
      color: #888888;
      margin-bottom: 2.5rem;
    }
    .about {
      max-width: 360px;
      color: #aaaaaa;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      border-top: 0.5px solid #333;
      border-bottom: 0.5px solid #333;
      padding: 1.5rem 0;
    }
    .form-row {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 360px;
    }
    .form-row input {
      flex: 1;
      background: #2a2a2a;
      border: 0.5px solid #3a3a3a;
      border-radius: 8px;
      padding: 0 14px;
      height: 42px;
      color: #F7F6F3;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .form-row input::placeholder { color: #555; }
    .form-row input:focus { border-color: #7d3333; }
    .form-row button {
      background: #7d3333;
      color: #F7F6F3;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      height: 42px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: background 0.15s;
    }
    .form-row button:hover { background: #5e2626; }
    .confirm {
      font-size: 0.8rem;
      color: #555;
      margin-top: 0.75rem;
      min-height: 1rem;
    }
    .confirm.show { color: #ffbd59; }
  </style>
</head>
<body>
  <img class="logo-mark" src="Chainivore.svg" alt="Chainivore logo" />
  <div class="wordmark">Chainivore</div>
  <div class="tagline">Something's cooking.</div>
  <div class="about">
    Chainivore is the app where your third visit to Olive Garden this month finally counts for something. Log, rate, and obsess over every chain you've conquered. Discover ones you haven't hit yet and see what your friends are devouring. Coming soon.
  </div>
  <div class="form-row">
    <input type="email" id="email-input" placeholder="your@email.com" />
    <button id="notify-btn">Notify me</button>
  </div>
  <div class="confirm" id="confirm"></div>

  <script>
    var SUPABASE_URL = 'https://cupvsxjwgdofcuunbsex.supabase.co';
    var SUPABASE_ANON_KEY = 'sb_publishable_0zwwsk5sinBgby0X-Lkp5g_ju-WSPjj';

    async function handleSubmit() {
      var email = document.getElementById('email-input').value.trim();
      var c = document.getElementById('confirm');
      var btn = document.getElementById('notify-btn');

      if (!email || !email.includes('@')) {
        c.textContent = 'Enter a valid email address.';
        c.classList.add('show');
        return;
      }

      btn.textContent = 'Saving...';
      btn.disabled = true;

      try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/waitlist', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ email: email })
        });

        if (res.ok) {
          c.textContent = "You're on the list. We'll be in touch.";
          c.classList.add('show');
          document.getElementById('email-input').value = '';
        } else if (res.status === 409) {
          c.textContent = "You're already on the list.";
          c.classList.add('show');
        } else {
          c.textContent = 'Something went wrong. Try again.';
          c.classList.add('show');
        }
      } catch (err) {
        c.textContent = 'Something went wrong. Try again.';
        c.classList.add('show');
      }

      btn.textContent = 'Notify me';
      btn.disabled = false;
    }

    document.getElementById('notify-btn').addEventListener('click', handleSubmit);
    document.getElementById('email-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>

<!-- v2 -->
</body>
</html>
